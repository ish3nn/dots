####################
### KEYBINDINGSS ###
####################

$mainMod = SUPER

# Default
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, au ipc display brighter 0.1
bindel = ,XF86MonBrightnessDown, exec, au ipc display dimmer 0.1

bindel = $mainMod,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = $mainMod,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshots
# region - clipboard
bind = $mainMod SHIFT, S, exec, hyprshot --clipboard-only -m region
# fullscreen - clipboard
bind = $mainMod SHIFT, D, exec, hyprshot --clipboard-only -m output
# region - file
bind = $mainMod CTRL SHIFT, S, exec, hyprshot -m region
# fullscreen - file
bind = $mainMod CTRL SHIFT, D, exec, hyprshot -m output

# Fullscreen
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, C, fullscreen, 1

# Reload
bind = $mainMod, R, exec, hyprctl reload

# Default Launchers
bind = SUPER, TAB, exec, rofi -show drun
bind = $mainMod      , RETURN , exec, $terminal
bind = $mainMod      , E      , exec, $fileManager
bind = $mainMod      , B      , exec, $browser


bind = $mainMod ALT, left , resizeactive, -25 0
bind = $mainMod ALT, right, resizeactive, 25  0
bind = $mainMod ALT, up   , resizeactive, 0   -25
bind = $mainMod ALT, down , resizeactive, 0   25

bind = $mainMod CONTROL, left, movewindow, l
bind = $mainMod CONTROL, right, movewindow, r
bind = $mainMod CONTROL, up, movewindow, u
bind = $mainMod CONTROL, down, movewindow, d

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#bind = $mainMod,     Tab, cyclenext,
#bind = $mainMod,     Tab, bringactivetotop,

bind = $mainMod,     Q, killactive,
bind = $mainMod Control,   C, togglefloating,

# Workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9


bind = $mainMod SHIFT, left, workspace, e-1
bind = $mainMod SHIFT, right, workspace, +1

bind = ALT, Tab, focuscurrentorlast
